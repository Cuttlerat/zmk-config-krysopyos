CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# BT controller required by zmk-feature-split-esb for MPSL timeslot.
# BLE profile stays disabled via base config CONFIG_ZMK_BLE=n.
CONFIG_BT=y

# USB output to host
CONFIG_ZMK_USB=y

CONFIG_ZMK_HID_REPORT_TYPE_HKRO=y
CONFIG_ZMK_HID_KEYBOARD_REPORT_SIZE=10
CONFIG_ZMK_HID_CONSUMER_REPORT_SIZE=10
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y

CONFIG_BT_MAX_PAIRED=1
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1
